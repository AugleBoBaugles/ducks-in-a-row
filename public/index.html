<!DOCTYPE html>
<!--
  public/index.html
  HTML structure for the Groq Whisper Transcriber.
  Styling  → public/styles.css
  Logic    → public/app.js  (imports public/recorder.js)
-->
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groq Whisper Transcriber</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="card">

    <!-- HEADER -->
    <div>
      <h1>Groq Whisper Transcriber</h1>
      <br>
      <p class="subtitle">Talk to the duck. The duck listens.</p>
    </div>

    <!-- RECORDING SECTION
         The duck image doubles as the record/stop button.
         app.js toggles the .recording class and updates #duckLabel.
    -->
    <div class="record-section">

      <!--
        type="button" prevents accidental form submission if this were ever
        inside a <form>. aria-label gives screen readers a description since
        the button's visible content is just an image and a span.
      -->
      <button id="duckBtn" class="duck-btn" type="button" aria-label="Start recording">
        <img src="duck.svg" alt="Rubber duck" />
        <span id="duckLabel">Click to start recording</span>
      </button>

      <!--
        The countdown timer. aria-live="polite" tells screen readers to
        announce updates without interrupting whatever they're currently saying.
        app.js writes MM:SS formatted text here every second while recording.
      -->
      <p id="timer" class="timer" aria-live="polite"></p>

    </div>

    <!-- STATUS MESSAGE — loading text or error messages -->
    <p id="status"></p>

    <!-- TRANSCRIPTION RESULT — hidden until a response arrives -->
    <div id="resultBox" class="result-box hidden">
      <h2>You said</h2>
      <p id="transcriptionText"></p>
    </div>

    <!-- RUBBER DUCKY RESPONSE — hidden until the LLM responds -->
    <div id="duckyBox" class="result-box ducky-box hidden">
      <h2>🦆 The rubber ducky responds:</h2>
      <p id="duckyText"></p>
    </div>

  </div>

  <!--
    type="module" does two things:
      1. Enables ES Module syntax (import/export) in the file
      2. Automatically defers execution — the script runs after the HTML is
         fully parsed, so all the getElementById() calls in app.js are safe
  -->
  <script type="module" src="app.js"></script>

</body>
</html>
