<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Drop shadow to ground the duck visually -->
  <ellipse cx="50" cy="96" rx="34" ry="4" fill="rgba(0,0,0,0.08)"/>
  <!-- Body: wide horizontal oval -->
  <ellipse cx="47" cy="72" rx="40" ry="24" fill="#FFD700"/>
  <!-- Head: smaller circle that overlaps the top-right of the body -->
  <circle cx="65" cy="42" r="20" fill="#FFD700"/>
  <!-- Beak: triangle pointing right -->
  <path d="M83,36 L98,42 L83,48 Z" fill="#FF8C00"/>
  <!-- Eye white -->
  <circle cx="72" cy="35" r="5" fill="white"/>
  <!-- Eye pupil -->
  <circle cx="73" cy="35" r="3" fill="#1a1a1a"/>
  <!-- Eye sparkle -->
  <circle cx="74.5" cy="33.5" r="1.1" fill="white"/>
  <!-- Wing detail: a curved stroke across the body -->
  <path d="M15,70 Q38,57 58,70" fill="none" stroke="#E5B800" stroke-width="2.5" stroke-linecap="round"/>
</svg>
